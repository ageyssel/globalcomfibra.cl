<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Globalcom | Gestión de Clientes</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen hidden" id="adminBody">

    <nav class="bg-[#1a1f2e] text-white py-4 px-6 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <span class="font-black text-xl tracking-tight">GLOBALCOM ADMIN</span>
                <span class="bg-red-500 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-widest">NOC & CRM</span>
            </div>
            <div class="flex items-center space-x-6">
                <span id="adminUserEmail" class="text-[10px] font-bold text-slate-400 hidden md:inline">admin@globalcomfibra.cl</span>
                <button onclick="cerrarSesion()" class="text-sm font-bold text-slate-300 hover:text-white transition">Salir del Admin</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid lg:grid-cols-2 gap-8">
            
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-2xl font-black text-[#1a1f2e] mb-6 border-b border-slate-100 pb-4">Alta de Nuevo Cliente</h2>
                
                <form id="formCrearCliente" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Razón Social</label>
                            <input type="text" id="cEmpresa" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">RUT Empresa</label>
                            <input type="text" id="cRut" required placeholder="12.345.678-9" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Contacto Técnico</label>
                            <input type="text" id="cContacto" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Contacto Facturación</label>
                            <input type="text" id="cContactoFact" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Email de Acceso (Login)</label>
                            <input type="email" id="cEmail" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-orange-600 uppercase tracking-widest">Crear Contraseña Portal</label>
                            <input type="password" id="cPassword" required placeholder="Mínimo 6 caracteres" class="w-full mt-1 bg-orange-50 border border-orange-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-orange-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Email Facturación</label>
                            <input type="email" id="cEmailFact" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Fecha Inicio Contrato</label>
                            <input type="date" id="cFecha" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Dirección de Instalación</label>
                            <input type="text" id="cDireccion" required class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Duración Contrato (Meses)</label>
                            <input type="number" id="cContratoMeses" required value="12" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">IP Pública Asignada</label>
                            <input type="text" id="cIp" placeholder="0.0.0.0" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Plan Contratado</label>
                            <select id="cPlan" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                <option>Internet Dedicado 100 Mbps</option>
                                <option>Internet Dedicado 500 Mbps</option>
                                <option>Internet Dedicado 1 Gbps</option>
                                <option>Fibra Oscura / Capa 2</option>
                            </select>
                        </div>
                    </div>

                    <div class="p-4 bg-blue-50 rounded-xl border border-blue-100 space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-blue-700 uppercase tracking-widest">Link NOC (PurpleHackers)</label>
                            <input type="url" id="cDashboard" placeholder="https://app.purplehackers.com/..." class="w-full mt-1 bg-white border border-blue-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-blue-700 uppercase tracking-widest">Usuario NOC</label>
                                <input type="text" id="cUserNoc" placeholder="admin_cliente" class="w-full mt-1 bg-white border border-blue-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-blue-700 uppercase tracking-widest">Clave NOC</label>
                                <input type="text" id="cPassNoc" placeholder="***" class="w-full mt-1 bg-white border border-blue-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Subir Contrato PDF</label>
                        <input type="file" id="cArchivoContrato" accept=".pdf" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm">
                    </div>

                    <button type="submit" id="btnCrearCliente" class="w-full bg-[#1a1f2e] text-white font-bold py-4 rounded-xl hover:bg-blue-800 transition shadow-lg mt-4">
                        Crear Cliente y Cuenta de Acceso
                    </button>
                </form>
            </div>

            <div class="space-y-8">
                
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-2xl font-black text-[#1a1f2e] mb-6 border-b border-slate-100 pb-4">Gestión de Clientes</h2>
                    <div class="overflow-hidden rounded-xl border border-slate-100">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                <tr>
                                    <th class="px-4 py-3">Empresa</th>
                                    <th class="px-4 py-3 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tablaClientesBody" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-2xl font-black text-[#1a1f2e] mb-4">Módulo de Facturación</h2>
                    
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Seleccionar Cliente</label>
                    <select id="selectClienteFactura" class="w-full mt-2 mb-6 bg-slate-50 border border-slate-300 rounded-lg px-4 py-3 font-semibold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 transition">
                        <option value="">Cargando clientes...</option>
                    </select>

                    <form id="formFactura" class="space-y-4 bg-green-50 p-6 rounded-xl border border-green-100">
                        <div>
                            <label class="text-[10px] font-bold text-green-800 uppercase tracking-widest">Mes de Facturación (Ej: Mayo 2026)</label>
                            <input type="text" id="inpMes" required class="w-full mt-1 bg-white border border-green-200 rounded-lg px-3 py-2 text-sm focus:ring-2 outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-green-800 uppercase tracking-widest">Archivo PDF Factura</label>
                            <input type="file" id="inpArchivoFactura" accept=".pdf" required class="w-full mt-1 bg-white border border-green-200 rounded-lg px-3 py-2 text-sm focus:ring-2 outline-none">
                        </div>
                        <button type="submit" id="btnSubirFactura" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition shadow-md">
                            Subir y Notificar Automáticamente
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <div id="modal-detalle" class="hidden fixed inset-0 bg-[#1a1f2e]/80 backdrop-blur-md z-[100] flex justify-center items-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-5xl max-h-[95vh] overflow-y-auto shadow-2xl relative border border-slate-200">
            <button onclick="document.getElementById('modal-detalle').classList.add('hidden')" class="absolute top-8 right-8 text-slate-400 hover:text-red-500 transition z-10">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <div class="p-10">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-6">
                        <div id="detIniciales" class="h-16 w-16 rounded-3xl bg-blue-600 text-white flex items-center justify-center text-2xl font-black shadow-lg">?</div>
                        <div>
                            <h2 id="detEmpresa" class="text-3xl font-black text-[#1a1f2e]">Nombre Empresa</h2>
                            <p id="detEmail" class="text-slate-500 font-medium text-sm">correo@cliente.cl</p>
                        </div>
                    </div>
                    <button id="btnEstadoCliente" onclick="toggleEstadoCliente()" data-estado="Activo" class="text-[10px] font-bold px-4 py-2 rounded-full uppercase tracking-widest transition shadow-sm border border-transparent">Activo</button>
                </div>

                <div class="grid md:grid-cols-2 gap-10">
                    <div class="space-y-6">
                        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-blue-600">Datos y Configuración (Editable)</h3>
                        
                        <form id="formEditarCliente" class="bg-slate-50 rounded-3xl p-6 border border-slate-100 space-y-4">
                            <input type="hidden" id="editEmailOriginal">
                            
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">Empresa</label>
                                    <input type="text" id="eEmpresa" class="w-full mt-1 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                                </div>
                                <div>
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">RUT</label>
                                    <input type="text" id="eRut" class="w-full mt-1 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">Contacto Técnico</label>
                                    <input type="text" id="eContacto" class="w-full mt-1 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                                </div>
                                <div>
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">Cont. Facturación</label>
                                    <input type="text" id="eContactoFact" class="w-full mt-1 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                                </div>
                            </div>
                            
                            <div>
                                <label class="text-[9px] font-bold text-slate-500 uppercase">Email Facturación</label>
                                <input type="email" id="eEmailFact" class="w-full mt-1 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                            </div>
                            
                            <div>
                                <label class="text-[9px] font-bold text-slate-500 uppercase">Dirección Instalación</label>
                                <input type="text" id="eDireccion" class="w-full mt-1 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                            </div>
                            
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">IP Pública</label>
                                    <input type="text" id="eIp" class="w-full mt-1 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                                </div>
                                <div>
                                    <label class="text-[9px] font-bold text-slate-500 uppercase">Meses Contrato</label>
                                    <input type="number" id="eMeses" class="w-full mt-1 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                                </div>
                            </div>
                            
                            <div>
                                <label class="text-[9px] font-bold text-slate-500 uppercase">Plan</label>
                                <input type="text" id="ePlan" class="w-full mt-1 bg-white border border-slate-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                            </div>
                            
                            <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 mt-2 space-y-2">
                                <div>
                                    <label class="text-[9px] font-bold text-blue-700 uppercase">Link NOC</label>
                                    <input type="text" id="eDashboard" class="w-full mt-1 bg-white border border-blue-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="text-[9px] font-bold text-blue-700 uppercase">Usuario NOC</label>
                                        <input type="text" id="eUserNoc" class="w-full mt-1 bg-white border border-blue-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                                    </div>
                                    <div>
                                        <label class="text-[9px] font-bold text-blue-700 uppercase">Clave NOC</label>
                                        <input type="text" id="ePassNoc" class="w-full mt-1 bg-white border border-blue-200 rounded-lg px-2 py-1.5 text-xs outline-none focus:ring-1">
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold text-xs hover:bg-blue-700 transition shadow-md mt-4">Guardar Cambios de Cliente</button>
                        </form>

                        <button id="btnVerContrato" class="w-full bg-[#1a1f2e] text-white py-3 rounded-xl font-bold text-sm hover:bg-slate-800 transition shadow-md">Descargar Contrato PDF Original</button>
                    </div>

                    <div class="space-y-6">
                        <h3 class="text-xs font-black uppercase tracking-[0.2em] text-blue-600">Historial de Facturas</h3>
                        <div id="listaFacturasDetalle" class="space-y-3 max-h-[500px] overflow-y-auto pr-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://eejsdoeuovcrjicrgxmo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlanNkb2V1b3ZjcmppY3JneG1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNzgxMjgsImV4cCI6MjA5MTc1NDEyOH0.enGQwKTh9tR59bP7TBjliAgiCuAqvG5d7pfLkinXNho';
        
        const adminSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const ADMIN_EMAIL = 'contacto@globalcomfibra.cl'; 

        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session } } = await adminSupabase.auth.getSession();
            if (!session || session.user.email !== ADMIN_EMAIL) {
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('adminBody').classList.remove('hidden');
            document.getElementById('adminUserEmail').textContent = session.user.email;
            cargarListaClientes();
        });

        async function cargarListaClientes() {
            const { data: clientes } = await adminSupabase.from('clientes').select('*').order('empresa', { ascending: true });
            
            const select = document.getElementById('selectClienteFactura');
            const tabla = document.getElementById('tablaClientesBody');
            
            select.innerHTML = '<option value="">Seleccione un cliente...</option>';
            tabla.innerHTML = '';
            
            if(clientes){
                clientes.forEach(c => {
                    const statusDot = (!c.estado || c.estado === 'Activo') ? '<span class="w-2 h-2 rounded-full bg-green-500 inline-block mr-2"></span>' : '<span class="w-2 h-2 rounded-full bg-red-500 inline-block mr-2"></span>';
                    
                    select.innerHTML += `<option value="${c.email}" data-fact="${c.correo_facturacion || c.email}">${c.empresa}</option>`;
                    
                    tabla.innerHTML += `
                        <tr class="hover:bg-slate-50 transition border-b border-slate-100 last:border-0">
                            <td class="px-4 py-4 font-bold text-[#1a1f2e] text-xs flex items-center">${statusDot} ${c.empresa}</td>
                            <td class="px-4 py-4 text-right">
                                <button onclick="gestionarCliente('${c.email}')" class="text-[9px] font-black uppercase bg-white border border-slate-200 text-slate-600 hover:bg-blue-600 hover:text-white hover:border-blue-600 px-3 py-1.5 rounded-lg transition tracking-widest shadow-sm">Editar / Gestionar</button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        // --- LÓGICA DE ALTA DE CLIENTE ---
        document.getElementById('formCrearCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnCrearCliente');
            const originalText = btn.textContent;
            btn.textContent = "Sincronizando...";
            btn.disabled = true;

            try {
                const email = document.getElementById('cEmail').value.trim().toLowerCase();
                const password = document.getElementById('cPassword').value;
                let urlContrato = "";
                const archivo = document.getElementById('cArchivoContrato').files[0];

                if (archivo) {
                    const fileName = `contrato_${email}_${Date.now()}.pdf`;
                    const { error: uploadError } = await adminSupabase.storage.from('contratos').upload(fileName, archivo);
                    if (uploadError) throw uploadError;
                    const { data } = adminSupabase.storage.from('contratos').getPublicUrl(fileName);
                    urlContrato = data.publicUrl;
                }

                const { error } = await adminSupabase.functions.invoke('create-client', {
                    body: {
                        email: email,
                        password: password,
                        clientData: {
                            empresa: document.getElementById('cEmpresa').value,
                            rut: document.getElementById('cRut').value,
                            contacto: document.getElementById('cContacto').value,
                            contacto_facturacion: document.getElementById('cContactoFact').value,
                            correo_facturacion: document.getElementById('cEmailFact').value.trim().toLowerCase(),
                            fecha_inicio: document.getElementById('cFecha').value,
                            direccion: document.getElementById('cDireccion').value,
                            contrato_meses: document.getElementById('cContratoMeses').value,
                            ip: document.getElementById('cIp').value,
                            plan: document.getElementById('cPlan').value,
                            url_dashboard: document.getElementById('cDashboard').value,
                            user_noc: document.getElementById('cUserNoc').value,
                            pass_noc: document.getElementById('cPassNoc').value,
                            url_contrato: urlContrato,
                            estado: 'Activo',
                            id_cliente: 'GCOM-' + Math.floor(1000 + Math.random() * 9000)
                        }
                    }
                });

                if (error) throw error;
                
                alert("¡Éxito! Perfil comercial y cuenta de acceso creados correctamente.");
                document.getElementById('formCrearCliente').reset();
                cargarListaClientes();

            } catch (err) {
                alert("Operación fallida: " + err.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // --- GESTIÓN INTEGRAL: LLENAR MODAL PARA EDICIÓN ---
        async function gestionarCliente(email) {
            const modal = document.getElementById('modal-detalle');
            modal.classList.remove('hidden');

            const { data: cliente } = await adminSupabase.from('clientes').select('*').eq('email', email).single();
            
            // Llenar Cabecera
            document.getElementById('detEmpresa').textContent = cliente.empresa;
            document.getElementById('detEmail').textContent = cliente.email;
            document.getElementById('detIniciales').textContent = cliente.empresa.substring(0,1).toUpperCase();

            // Llenar Formulario de Edición
            document.getElementById('editEmailOriginal').value = cliente.email;
            document.getElementById('eEmpresa').value = cliente.empresa || '';
            document.getElementById('eRut').value = cliente.rut || '';
            document.getElementById('eContacto').value = cliente.contacto || '';
            document.getElementById('eContactoFact').value = cliente.contacto_facturacion || '';
            document.getElementById('eEmailFact').value = cliente.correo_facturacion || '';
            document.getElementById('eDireccion').value = cliente.direccion || '';
            document.getElementById('eIp').value = cliente.ip || '';
            document.getElementById('eMeses').value = cliente.contrato_meses || '12';
            document.getElementById('ePlan').value = cliente.plan || '';
            document.getElementById('eDashboard').value = cliente.url_dashboard || '';
            document.getElementById('eUserNoc').value = cliente.user_noc || '';
            document.getElementById('ePassNoc').value = cliente.pass_noc || '';

            // Configurar Botón Estado
            const estadoActual = cliente.estado || 'Activo';
            actualizarBotonEstado(estadoActual);

            // Buscar contrato
            const { data: archivos } = await adminSupabase.storage.from('contratos').list('', { search: email });
            const btnContrato = document.getElementById('btnVerContrato');
            if (archivos && archivos.length > 0) {
                const { data: url } = adminSupabase.storage.from('contratos').getPublicUrl(archivos[0].name);
                btnContrato.onclick = () => window.open(url.publicUrl, '_blank');
                btnContrato.classList.remove('opacity-50', 'pointer-events-none');
                btnContrato.textContent = "Descargar Contrato PDF Original";
            } else {
                btnContrato.classList.add('opacity-50', 'pointer-events-none');
                btnContrato.textContent = "Sin Contrato PDF";
            }

            cargarFacturasDetalle(email);
        }

        // --- GESTIÓN INTEGRAL: GUARDAR EDICIÓN ---
        document.getElementById('formEditarCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = "Guardando..."; 
            btn.disabled = true;

            const emailOriginal = document.getElementById('editEmailOriginal').value;
            const updates = {
                empresa: document.getElementById('eEmpresa').value,
                rut: document.getElementById('eRut').value,
                contacto: document.getElementById('eContacto').value,
                contacto_facturacion: document.getElementById('eContactoFact').value,
                correo_facturacion: document.getElementById('eEmailFact').value,
                direccion: document.getElementById('eDireccion').value,
                ip: document.getElementById('eIp').value,
                contrato_meses: document.getElementById('eMeses').value,
                plan: document.getElementById('ePlan').value,
                url_dashboard: document.getElementById('eDashboard').value,
                user_noc: document.getElementById('eUserNoc').value,
                pass_noc: document.getElementById('ePassNoc').value
            };

            const { error } = await adminSupabase.from('clientes').update(updates).eq('email', emailOriginal);
            
            btn.textContent = "Guardar Cambios de Cliente"; 
            btn.disabled = false;
            
            if(error) alert("Error: " + error.message);
            else {
                alert("Datos del cliente actualizados correctamente.");
                document.getElementById('detEmpresa').textContent = updates.empresa; 
                cargarListaClientes(); 
            }
        });

        // --- GESTIÓN INTEGRAL: TOGGLE ESTADO ---
        async function toggleEstadoCliente() {
            const btn = document.getElementById('btnEstadoCliente');
            const email = document.getElementById('editEmailOriginal').value;
            const estadoActual = btn.dataset.estado;
            const nuevoEstado = estadoActual === 'Activo' ? 'Suspendido' : 'Activo';

            if(!confirm(`¿Desea cambiar el estado del cliente a ${nuevoEstado}?`)) return;

            const { error } = await adminSupabase.from('clientes').update({ estado: nuevoEstado }).eq('email', email);
            
            if(error) alert("Error: " + error.message);
            else {
                actualizarBotonEstado(nuevoEstado);
                cargarListaClientes();
            }
        }

        function actualizarBotonEstado(estado) {
            const btn = document.getElementById('btnEstadoCliente');
            btn.dataset.estado = estado;
            if(estado === 'Activo') {
                btn.className = "text-[10px] font-bold px-4 py-2 rounded-full uppercase tracking-widest bg-green-100 text-green-700 hover:bg-red-100 hover:text-red-700 transition shadow-sm border border-green-200";
                btn.innerHTML = `<span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> ACTIVO (Click para Suspender)</span>`;
            } else {
                btn.className = "text-[10px] font-bold px-4 py-2 rounded-full uppercase tracking-widest bg-red-100 text-red-700 hover:bg-green-100 hover:text-green-700 transition shadow-sm border border-red-200";
                btn.innerHTML = `<span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-red-500"></span> SUSPENDIDO (Click para Activar)</span>`;
            }
        }

        // --- LÓGICA DE FACTURACIÓN AUTOMATIZADA CON EDGE FUNCTION ---
        async function cargarFacturasDetalle(email) {
            const contenedor = document.getElementById('listaFacturasDetalle');
            contenedor.innerHTML = '<p class="text-xs italic">Cargando...</p>';
            
            const { data: facturas } = await adminSupabase.from('facturas').select('*').eq('email_cliente', email).order('created_at', { ascending: false });

            contenedor.innerHTML = '';
            if (!facturas || facturas.length === 0) {
                contenedor.innerHTML = '<p class="text-xs text-slate-400 italic text-center py-10">No hay facturas registradas.</p>';
                return;
            }

            facturas.forEach(f => {
                const item = document.createElement('div');
                item.className = "flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100 mb-2";
                item.innerHTML = `
                    <span class="text-xs font-black uppercase text-slate-700">${f.mes_anio}</span>
                    <div class="flex gap-2">
                        <a href="${f.url_archivo}" target="_blank" class="p-2 text-blue-600 hover:bg-white rounded-lg transition shadow-sm border border-slate-100">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        </a>
                        <button onclick="eliminarFactura(${f.id}, '${email}')" class="p-2 text-red-500 hover:bg-white rounded-lg transition shadow-sm border border-slate-100">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>`;
                contenedor.appendChild(item);
            });
        }

        async function eliminarFactura(id, email) {
            if (!confirm('¿Eliminar esta factura?')) return;
            await adminSupabase.from('facturas').delete().eq('id', id);
            cargarFacturasDetalle(email);
        }

        document.getElementById('formFactura').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const select = document.getElementById('selectClienteFactura');
            const emailCliente = select.value;
            const correoFact = select.options[select.selectedIndex].getAttribute('data-fact');
            const mes = document.getElementById('inpMes').value;
            const archivo = document.getElementById('inpArchivoFactura').files[0];
            const btn = document.getElementById('btnSubirFactura');

            if(!emailCliente || !archivo) return alert("Seleccione un cliente y el archivo PDF");
            
            const originalBtn = btn.textContent;
            btn.textContent = "Procesando Factura...";
            btn.disabled = true;

            try {
                // 1. Subir a Storage
                const fileName = `factura_${emailCliente}_${Date.now()}.pdf`;
                const { error: uploadError } = await adminSupabase.storage.from('facturas').upload(fileName, archivo);
                if (uploadError) throw uploadError;

                const { data: { publicUrl } } = adminSupabase.storage.from('facturas').getPublicUrl(fileName);
                
                // 2. Guardar en Base de Datos
                const { error: dbError } = await adminSupabase.from('facturas').insert({ 
                    email_cliente: emailCliente, 
                    mes_anio: mes, 
                    url_archivo: publicUrl 
                });
                
                if (dbError) throw dbError;

                // 3. Notificación Automática (Edge Function de Resend)
                const { data: res, error: err } = await adminSupabase.functions.invoke('send-invoice-notification', {
                    body: {
                        emailCliente: emailCliente,
                        correoFacturacion: correoFact,
                        mesAnio: mes,
                        urlArchivo: publicUrl,
                        empresa: select.options[select.selectedIndex].text
                    }
                });

                if (err) throw new Error("Factura subida, pero no se pudo enviar el correo: " + err.message);

                alert("¡Factura procesada y notificada por correo con éxito!");
                document.getElementById('formFactura').reset();

            } catch (err) {
                alert("Error en facturación: " + err.message);
            } finally {
                btn.textContent = originalBtn;
                btn.disabled = false;
            }
        });

        async function cerrarSesion() {
            await adminSupabase.auth.signOut();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
