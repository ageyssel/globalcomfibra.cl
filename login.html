<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Portal | Globalcom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-center items-center p-6 relative overflow-hidden">
    
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-blue-100 rounded-full blur-[120px] opacity-50 -z-10"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-orange-50 rounded-full blur-[120px] opacity-50 -z-10"></div>

    <div class="w-full max-w-md relative z-10">
        
        <div class="text-center mb-10">
            <a href="index.html" class="inline-block">
                <img src="img/logo.png" alt="Globalcom" class="h-20 mx-auto hover:opacity-80 transition object-contain">
            </a>
            <h2 class="mt-8 text-3xl font-black text-[#1a1f2e] tracking-tight">Portal Clientes</h2>
            <p class="text-sm text-slate-500 mt-2 font-medium">Ingresa tus credenciales corporativas</p>
        </div>

        <div class="bg-white rounded-[2rem] p-10 shadow-xl border border-slate-100">
            
            <form action="portal.html" class="space-y-6">
                
                <div>
                    <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1">Email Corporativo</label>
                    <input type="email" required placeholder="tu@empresa.cl" 
                           class="w-full mt-2 bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                
                <div>
                    <div class="flex justify-between items-center ml-1 mb-2">
                        <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Contraseña</label>
                        <a href="mailto:soporte@globalcomfibra.cl" class="text-[11px] font-bold text-blue-600 hover:text-blue-800 transition">¿Olvidaste tu clave?</a>
                    </div>
                    <input type="password" required placeholder="••••••••" 
                           class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-sm focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all shadow-lg mt-4">
                    Iniciar Sesión
                </button>
            </form>

        </div>

        <div class="text-center mt-12">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center justify-center">
                <svg class="w-4 h-4 mr-1 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                Conexión Segura End-to-End
            </p>
        </div>

    </div>
</body>
</html>
